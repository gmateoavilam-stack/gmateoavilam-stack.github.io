<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Texto</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #eef1f3;
      color: #9ca3aa;
    }

    main {
      width: min(88%, 620px);
      padding: 18px;
      background: #f7f8f9;
      border: 1px solid #eceff1;
      border-radius: 10px;
      box-shadow: 0 3px 12px rgba(0, 0, 0, 0.025);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 14px;
      font-weight: 500;
      color: #aab0b6;
    }

    textarea {
      width: 100%;
      min-height: 220px;
      padding: 10px;
      resize: vertical;
      border: 1px solid #e7eaec;
      border-radius: 7px;
      outline: none;

      font: 12px/1.45 Arial, sans-serif;
      color: #b5bbc0;
      background: #f1f3f4;
    }

    .botones {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 10px;
    }

    button {
      width: 105px;
      padding: 6px 10px;

      border: 1px solid #e1e4e6;
      border-radius: 6px;
      background: #eceff1;
      color: #9fa6ac;

      font-size: 11px;
      cursor: pointer;
    }

    button:hover {
      background: #e7eaec;
      color: #858d94;
    }

    #estado {
      min-height: 14px;
      margin: 6px 0 0;
      text-align: center;
      font-size: 10px;
      color: #aeb4b9;
    }
  </style>
</head>

<body>
  <main>
    <h1>Texto</h1>

    <textarea id="texto" readonly>

		progenitor(X, Y) :-
    padre(X, Y).

progenitor(X, Y) :-
    madre(X, Y).

hijo(X, Y) :-
    hombre(X),
    progenitor(Y, X).

hermanos(X, Y) :-
    progenitor(P, X),
    progenitor(P, Y),
    X \= Y.

hermano(X, Y) :-
    hombre(X),
    hermanos(X, Y).

abuelo(X, Y) :-
    hombre(X),
    progenitor(X, P),
    progenitor(P, Y).

nieto(X, Y) :-
    hombre(X),
    progenitor(Y, P),
    progenitor(P, X).

tio(X, Y) :-
    hombre(X),
    progenitor(P, Y),
    hermanos(X, P).

sobrino(X, Y) :-
    hombre(X),
    progenitor(P, X),
    hermanos(P, Y).

primo(X, Y) :-
    hombre(X),
    progenitor(PX, X),
    progenitor(PY, Y),
    hermanos(PX, PY),
    X \= Y.

conyuge(X, Y) :-
    matrimonio(X, Y).

conyuge(X, Y) :-
    matrimonio(Y, X).

suegro(X, Y) :-
    hombre(X),
    conyuge(Y, C),
    progenitor(X, C).

yerno(X, Y) :-
    hombre(X),
    conyuge(X, C),
    progenitor(Y, C).

cunado(X, Y) :-
    hombre(X),
    conyuge(Y, C),
    hermanos(X, C).

cunado(X, Y) :-
    hombre(X),
    conyuge(X, C),
    hermanos(C, Y).

antepasado(X, Y) :-
    progenitor(X, Y).

antepasado(X, Y) :-
    progenitor(X, Z),
    antepasado(Z, Y).

descendiente(X, Y) :-
antepasado(Y, X).

materia_puerta(X):-
	prerrequisito(X,Y),
	prerrequisito(X,Z),
	Y\=Z.
		
      .</textarea>

    <div class="botones">
      <button type="button" onclick="copiarTexto()">Copiar</button>
      <button type="button" onclick="descargarTexto()">Descargar TXT</button>
    </div>

    <p id="estado"></p>
  </main>

  <script>
    async function copiarTexto() {
      const campo = document.getElementById("texto");
      const estado = document.getElementById("estado");

      try {
        await navigator.clipboard.writeText(campo.value);
        estado.textContent = "Copiado";
      } catch (error) {
        campo.removeAttribute("readonly");
        campo.select();
        document.execCommand("copy");
        campo.setAttribute("readonly", "");
        estado.textContent = "Copiado";
      }
    }

    function descargarTexto() {
      const texto = document.getElementById("texto").value;
      const archivo = new Blob([texto], {
        type: "text/plain;charset=utf-8"
      });

      const enlace = document.createElement("a");
      enlace.href = URL.createObjectURL(archivo);
      enlace.download = "texto.txt";
      enlace.click();

      URL.revokeObjectURL(enlace.href);
      document.getElementById("estado").textContent = "Archivo descargado";
    }
  </script>
</body>
</html>
