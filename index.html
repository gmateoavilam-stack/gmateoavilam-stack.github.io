<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Texto</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #eef1f3;
      color: #9ca3aa;
    }

    main {
      width: min(88%, 620px);
      padding: 18px;
      background: #f7f8f9;
      border: 1px solid #eceff1;
      border-radius: 10px;
      box-shadow: 0 3px 12px rgba(0, 0, 0, 0.025);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 14px;
      font-weight: 500;
      color: #aab0b6;
    }

    textarea {
      width: 100%;
      min-height: 220px;
      padding: 10px;
      resize: vertical;
      border: 1px solid #e7eaec;
      border-radius: 7px;
      outline: none;

      font: 12px/1.45 Arial, sans-serif;
      color: #b5bbc0;
      background: #f1f3f4;
    }

    .botones {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 10px;
    }

    button {
      width: 105px;
      padding: 6px 10px;

      border: 1px solid #e1e4e6;
      border-radius: 6px;
      background: #eceff1;
      color: #9fa6ac;

      font-size: 11px;
      cursor: pointer;
    }

    button:hover {
      background: #e7eaec;
      color: #858d94;
    }

    #estado {
      min-height: 14px;
      margin: 6px 0 0;
      text-align: center;
      font-size: 10px;
      color: #aeb4b9;
    }
  </style>
</head>

<body>
  <main>
    <h1>Texto</h1>

    <textarea id="texto" readonly>
     1. Qué son los traits?, indique con un ejemplo
Son estructuras que permiten compartir atributos y métodos entre varias clases. Son similares a las interfaces, pero pueden contener métodos implementados.

trait Volador {
	def volar(): Unit = println("Estoy volando")
}
class Pajaro extends Volador

2. Características de la Programación OO en SCALA
- Utiliza clases y objetos
- Permite encapsulamiento mediante private y protected
- Admite herencia con extends
- Permite polimorfismo
- Utiliza trait para compartir comportamientos
- Todo valor en Scala es considerado un objeto

3. Indique las características de la programación funcional en SCALA
- las funciones pueden almacenarse en variables
- Permite pasar funciones como parámetros
- Favorece el uso de datos inmutables como val
- Utiliza funciones como map, filter, fold y reduce
- Evita modificar estados y producir efectos secundarios
- Permite funciones anónimas y de orden superior

4. Qué es el pattern matching?, indique con un ejemplo sobre cualquier objeto
El pattern matching permite comparar un valor con diferentes patrones y ejecutar la accion según la coincidencia.
val animal="Perro"

animal match {
	case "Perro"=>println("Es un perro")
	case "Gato"=>println("Es un gato")
	case _=>println("Animal desconocido")
}
 
5. Qué es un Closure en SCALA, indique con un ejemplo
Un closure es una función que utiliza una variable fuera de ella.
val incremento=5
val sumar=(numero:Int)=>numero+incremento
println(sumar(10))

Traits: definen comportamientos reutilizables que pueden ser implementados por distintas clases.
Object: define un objeto único o singleton; solo existe una instancia y no se utiliza new.
Option: representa un valor que puede existir o no, evitando utilizar null.
Some: indica que un Option contiene un valor.
Lazy: hace que una variable se inicialice únicamente cuando se utiliza por primera vez.
Funciones de orden superior: reciben funciones como parámetros o devuelven funciones como resultado.
Currying: transforma una función con varios parámetros en una secuencia de funciones con un parámetro.
Serialización: convierte un objeto en datos para poder guardarlo o transmitirlo.
      .</textarea>

    <div class="botones">
      <button type="button" onclick="copiarTexto()">Copiar</button>
      <button type="button" onclick="descargarTexto()">Descargar TXT</button>
    </div>

    <p id="estado"></p>
  </main>

  <script>
    async function copiarTexto() {
      const campo = document.getElementById("texto");
      const estado = document.getElementById("estado");

      try {
        await navigator.clipboard.writeText(campo.value);
        estado.textContent = "Copiado";
      } catch (error) {
        campo.removeAttribute("readonly");
        campo.select();
        document.execCommand("copy");
        campo.setAttribute("readonly", "");
        estado.textContent = "Copiado";
      }
    }

    function descargarTexto() {
      const texto = document.getElementById("texto").value;
      const archivo = new Blob([texto], {
        type: "text/plain;charset=utf-8"
      });

      const enlace = document.createElement("a");
      enlace.href = URL.createObjectURL(archivo);
      enlace.download = "texto.txt";
      enlace.click();

      URL.revokeObjectURL(enlace.href);
      document.getElementById("estado").textContent = "Archivo descargado";
    }
  </script>
</body>
</html>
