  class AgendaModelo(
  val carpetaDatos: String = "datos",
  val nombreArchivo: String = "agenda.dat"
) {

  private val rutaArchivo = Paths.get(carpetaDatos, nombreArchivo)
  private var contactos: Vector[Contacto] = Vector.empty

  crearCarpeta()
  cargarDatos()

  private def crearCarpeta(): Unit = {
    val carpeta = Paths.get(carpetaDatos)
    if (!Files.exists(carpeta)) Files.createDirectories(carpeta)
  }

  def guardarDatos(): Boolean = {
    try {
      crearCarpeta()
      val oos = new ObjectOutputStream(
        new BufferedOutputStream(
          new FileOutputStream(rutaArchivo.toFile)
        )
      )
      try oos.writeObject(contactos)
      finally oos.close()
      true
    } catch {
      case _: Throwable => false
    }
  }

private def cargarDatos(): Unit = {
  if (!Files.exists(rutaArchivo)) return

  try {
    val ois = new ObjectInputStream(
      new BufferedInputStream(
        new FileInputStream(rutaArchivo.toFile)
      )
    )

    val obj = try ois.readObject() finally ois.close()

    obj match {
      case v: Vector[_] =>
        if (v.forall(_.isInstanceOf[Contacto])) {
          contactos = v.asInstanceOf[Vector[Contacto]]
        }

      case _ => ()
    }

  } catch {
    case _: Exception => ()
  }
}

1. Qué son los traits?, indique con un ejemplo
Son estructuras que permiten compartir atributos y métodos entre varias clases. Son similares a las interfaces, pero pueden contener métodos implementados.

trait Volador {
	def volar(): Unit = println("Estoy volando")
}
class Pajaro extends Volador

2. Características de la Programación OO en SCALA
- Utiliza clases y objetos
- Permite encapsulamiento mediante private y protected
- Admite herencia con extends
- Permite polimorfismo
- Utiliza trait para compartir comportamientos
- Todo valor en Scala es considerado un objeto

3. Indique las características de la programación funcional en SCALA
- las funciones pueden almacenarse en variables
- Permite pasar funciones como parámetros
- Favorece el uso de datos inmutables como val
- Utiliza funciones como map, filter, fold y reduce
- Evita modificar estados y producir efectos secundarios
- Permite funciones anónimas y de orden superior

4. Qué es el pattern matching?, indique con un ejemplo sobre cualquier objeto
El pattern matching permite comparar un valor con diferentes patrones y ejecutar la accion según la coincidencia.
val animal="Perro"

animal match {
	case "Perro"=>println("Es un perro")
	case "Gato"=>println("Es un gato")
	case _=>println("Animal desconocido")
}

1. El comportamiento de un objeto se define mediante TRAITS en Scala

Option: Representa un valor que puede existir o no existir, evitando usar null.

object: Define un objeto único, llamado singleton. Solo existe una instancia y no se utiliza new.

lazy: hace que una variable se inicialice solo cuando se utiliza por primera vez, no cuando se declara.

  <script>
    async function copiarTexto() {
      const campo = document.getElementById("texto");
      const estado = document.getElementById("estado");

      try {
        await navigator.clipboard.writeText(campo.value);
        estado.textContent = "Copiado";
      } catch (error) {
        campo.removeAttribute("readonly");
        campo.select();
        document.execCommand("copy");
        campo.setAttribute("readonly", "");
        estado.textContent = "Copiado";
      }
    }

    function descargarTexto() {
      const texto = document.getElementById("texto").value;
      const archivo = new Blob([texto], {
        type: "text/plain;charset=utf-8"
      });

      const enlace = document.createElement("a");
      enlace.href = URL.createObjectURL(archivo);
      enlace.download = "texto.txt";
      enlace.click();

      URL.revokeObjectURL(enlace.href);
      document.getElementById("estado").textContent = "Archivo descargado";
    }
  </script>
